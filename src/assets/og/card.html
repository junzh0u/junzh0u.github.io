<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    Source for the Open Graph preview image. Edit here, then run `just og`
    to regenerate /og-image.png. Tokens mirror assets/css/style.css.
  -->
  <style>
    /* relative URLs: this card renders via file://, not from the site root */
    @font-face {
      font-family: "Fraunces";
      src: url("../fonts/Fraunces.woff2") format("woff2");
      font-weight: 600 700;
    }
    @font-face {
      font-family: "Newsreader";
      src: url("../fonts/Newsreader.woff2") format("woff2");
      font-weight: 400 600;
    }
    @font-face {
      font-family: "Newsreader";
      src: url("../fonts/Newsreader-Italic.woff2") format("woff2");
      font-weight: 400;
      font-style: italic;
    }
    :root {
      --text: #2b2520;
      --muted: #8a7f73;
      --bg: #faf6ef;
      --accent: #c14f26;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; }
    body {
      background:
        radial-gradient(1100px 380px at 50% -190px,
          color-mix(in srgb, var(--accent) 6%, transparent), transparent),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 90px 96px;
    }
    .kicker {
      font-size: 22px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      position: relative;
      padding-top: 28px;
      margin-bottom: 44px;
    }
    .kicker::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 56px;
      height: 3px;
      background: var(--accent);
    }
    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-size: 128px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 32px;
    }
    .wordmark em {
      color: var(--accent);
      font-style: normal;
    }
    .tagline {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: 42px;
      letter-spacing: 0;
      color: var(--muted);
    }
    .tagline b {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <p class="kicker">Jun Zhou · Staff Software Engineer</p>
  <h1 class="wordmark">junz<em>hou</em>.info</h1>
  <p class="tagline">I build, ship, and tinker &mdash; <b>for a living</b> and <b>for fun</b>.</p>
</body>
</html>
