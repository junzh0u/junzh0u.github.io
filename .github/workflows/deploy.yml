name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token for the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx @11ty/eleventy

      # Ships as /resume.pdf — a link-preserving export (the macOS print
      # dialog's "Save as PDF" drops hyperlinks; this pipeline keeps them).
      # Mirrors `just resume-pdf`; keep the Chrome flags in sync. Served over
      # localhost because root-relative asset paths break under file://.
      - name: Generate résumé PDF
        run: |
          python3 -m http.server 8123 --directory _site &
          server=$!
          sleep 1
          timeout 60 google-chrome --headless=new --disable-gpu \
            --no-first-run --disable-background-networking --disable-component-update \
            --no-pdf-header-footer --print-to-pdf=_site/resume.pdf \
            http://localhost:8123/resume/ || true
          kill "$server"
          test -s _site/resume.pdf

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
